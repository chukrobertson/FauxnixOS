[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "fauxnix-tools"
version = "0.1.0"
description = "Shared AI tooling for FauxnixOS — file understanding, vision, media, LLM routing"
requires-python = ">=3.10"
dependencies = [
    "ollama>=0.6.2",
    "chromadb>=1.5.9",
    "Pillow>=10.0.0",
    "pytesseract>=0.3.10",
    "PyMuPDF>=1.23.0",
    "python-docx>=1.1.0",
    "openpyxl>=3.1.0",
    "opencv-python-headless>=4.10.0",
    "numpy>=1.24.0",
    "faster-whisper>=1.0.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
vision = [
    "insightface>=0.7.3",
]
media = [
    "faster-whisper>=1.0.0",
]
llm = [
    "ollama>=0.6.2",
    "chromadb>=1.5.9",
]

[tool.setuptools.packages.find]
include = ["fauxnix_tools*"]
