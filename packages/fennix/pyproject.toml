[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "fennix"
version = "0.1.0"
description = "OS-integrated local LLM assistant for FauxnixOS — context awareness, file ingestion, conversation recall"
requires-python = ">=3.10"
dependencies = [
    "fauxnix-tools>=0.1.0",
    "pyperclip>=1.8.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
full = [
    "PyQt6>=6.5.0",
]

[tool.setuptools.packages.find]
include = ["fennix*"]

[project.scripts]
fennix = "fennix.__main__:main"
